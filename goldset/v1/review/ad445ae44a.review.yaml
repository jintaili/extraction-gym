    b: 'Our first coffee from José Peña continues our exploration of Urrao and the Chiroso variety. This
      region and variety continue to shift the conversation around quality and the diversity of flavor
      profiles within Colombian coffee, and we are excited to continue this exploration.


      VARIETAL

      Chiroso

      REGION

      Urrao, Antioquia

      ALTITUDE

      2,000 masl

      HARVEST

      February 2026

      PROCESSING

      Hand-picked at peak ripeness. Floated to further remove defects. Held in-cherry overnight. De-pulped.
      Dry-fermented for 36 hours. Washed. Dried on raised beds until moisture content reaches 10.5%.


      ABOUT JOSÉ PEÑA

      We have been working on a project in Urrao for several years now. Each year, the cupping table brings
      coffees from producers new to the project—an ongoing reminder of how much potential this region
      holds and how deeply this program motivates the producers who are a part of it. This is the first
      year we have tasted coffee from José Peña''s farm, and the quality is exceptional. The future of
      this project continues to inspire.


      ABOUT CHIROSO

      Chiroso is a new variety being grown primarily in the region of Antioquia, Colombia. We only started
      hearing about its cultivation a couple of years ago, but because of its cup quality potential, it
      is beginning to spread. The variety has been genetically identified as an Ethiopian Landrace, but
      unfortunately we cannot get any more specific than that at this time. We have been working very
      hard building a buying program in the region of Urrao specifically around the variety of Chiroso.
      We still don''t know where or how this variety came to be cultivated in this particular region,
      but its cup quality is extraordinary. We will be working with our exporting partner, The Coffee
      Quest, to continue developing this project, and hope that we''ll be able to bring you more of this
      special coffee from this special region year after year.'
