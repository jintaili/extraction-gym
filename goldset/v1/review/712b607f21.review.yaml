      selected seeds from wild coffee trees from the the nearby Coche forest and the trees he planted
      are still producing well today. The coffee cherries are selectively hand picked by hired workers
      from the local community and sorted before they rest over night in the cherry receiving tank. The
      cherries are de-pulped in the next morning. Once de-pulped, the parchment coffee, with it’s mucilage
      still on, is wet fermented in clean water for about 24 hours. After fermentation the coffee is graded
      and washed in a washing channel in order to remove the remaining mucilage and grade out the light
      coffee beans. The coffees are dried on elevated drying tables covered with shade nets where defect
      parchment coffee gets sorted out by hand. Drying the coffee takes about 12 - 14 days. Echemo: Khalid
      Shifa is the owner of Echemo. He is 3rd generation coffee farmer and inherited the 35 hectare farm
      from his father. Echemo is situated near the town of Agaro, in Goma in the south west part of Ethiopia.'
