  coffee.sensory_text:
    a: Café de especialidad Bourbon Ají con notas de uva moscatel, cacao y hierbaluisa. Acidez brillante,
      cuerpo sedoso y matices de melocotón y caramelo.
    b: Muscat grape, cocoa butter, lemon verbena. This Bourbon Ají offers an intense cup where notes of
      Muscat grape, cocoa butter and lemon verbena stand out. The acidity is bright, accompanied by a
      silky body that envelops the palate. As it evolves, nuances of peach, caramel, strawberry lollipop
      and lime peel emerge, bringing vibrant complexity and elegant balance. The result is a coffee of
      high sensory intensity, with sweet structure and crisp acidity, where the process highlights the
      floral, fruity and citrus notes typical of the terroir of Acevedo.
  coffee.display_tasting_notes:
    a: Uva Moscatel, Manteca de cacao, Hierbaluisa, Melocotón, Caramelo
    b: Muscat grape, cocoa butter, lemon verbena, peach, caramel, strawberry lollipop, lime peel
  coffee.producer_text:
    a: Finca Las Flores nació en 1990 gracias a Edilberto Vergara y Nubia Ayure, quienes comenzaron con
      tan solo dos hectáreas de café. Con el tiempo, la finca creció hasta convertirse en uno de los referentes
      de Acevedo, Huila. En 2019, su hijo Jhoan Vergara alcanzó el reconocimiento internacional al ganar
      el concurso Master of Coffee con su Pink Bourbon, consolidando la reputación familiar. Hoy, Jhoan
      lidera la innovación en procesos y la introducción de variedades exóticas como Sidra, Java y Bourbon
      Ají. Este último, cultivado a 1.750 metros, reflexiona la curiosidad y la precisión que caracterizan
      su enfoque. Cada lote se procesa bajo control técnico riguroso, combinando fermentaciones controladas
      con bacterias cultivadas y choques térmicos que realzan la expresión aromática del grano.
    b: 'Category: Competition. Variety: Bourbon Ají. Altitude: 1750 MASL. Process: Washed. Harvest: 2025.
      Finca Las Flores was born in 1990 thanks to Edilberto Vergara and Nubia Ayure, who began with just
      two hectares of coffee. Over time, the farm grew to become one of the benchmarks of Acevedo, Huila.
      In 2019, their son Jhoan Vergara achieved international recognition by winning the Master of Coffee
      contest with his Pink Bourbon, consolidating the family reputation. Today, Jhoan leads innovation
      in processes and the introduction of exotic varieties such as Sidra, Java and Bourbon Ají. This
      latter, grown at 1,750 meters, reflects the curiosity and precision that characterize his approach.
      Each lot is processed under rigorous technical control, combining controlled fermentations with
      cultivated bacteria and thermal shocks that enhance the aromatic expression of the bean. Finca Las
      Flores represents a new generation of coffee growers who understand coffee as a scientific and artistic
      product, where tradition and experimentation meet to create unique sensory experiences. The Bourbon
      Ají cherries undergo 12 hours of oxidation before pulping, followed by a thermal shock at 50 °C
      that fixes the aromatic compounds. Subsequently, the coffee ferments for 80 hours in controlled
      plastic tanks with inoculated bacteria, and finally dries in dehumidifying machines for 60 hours
      until reaching 10% humidity.'
