  coffee.producer_text: 'Southern Weather embodies everything we love about specialty coffee and has evolved
    into a foundational blend. We brew this in our own cafes as a “House” filter option and love how it
    balances the relationship between modern citric acidity flavors with full bodied chocolates. This
    comfortable, yet surprisingly complex and sophisticated coffee is approachable to all. It performs
    well on its own for the purist or with fats such as dairy or plant based beverages, making it a true
    answer for all coffee needs.; ORIGIN: Honduras, Colombia, Ethiopia; VARIETY: Mixed; HARVEST SEASON:
    Rotating Microlots; PROCESS METHOD: Washed; 1850 MASL; Raised-Bed Dried; Southern Weather was the
    first blend we ever created. Our approach to creating blends is a bit different at Onyx. Instead of
    choosing coffees from specific countries or regions that will, in theory, intertwine well to develop
    complex & cohesive flavors like most, we start from the end and work our way back. This perspective
    means we choose to create a particular flavor profile first - deciding which acidities, sugars, and
    fats we want to accentuate for the coffee. Once a flavor profile has been set, in this case, a very
    approachable citrus zest, milk chocolate, and candied nuts for Southern Weather, we then start cupping
    blind through a lot of coffees to find these specific attributes. The purpose is that once a flavor
    profile is created, we update the coffees that make up Southern Weather every 2-3 months. This allows
    us to have a year-round blend with a flavor profile of high quality while retaining our commitment
