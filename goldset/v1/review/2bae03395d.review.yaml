  coffee.producer_text:
    a: Gilber Huayllas, Llaqta Pata, 2380masl, Anaerobic Washed, SL9, Inkawasi, Cusco, Peru
    b: 'Origin Details

      Region: Inkawasi, Cusco, Peru

      Elevation: 2380masl

      Producer: Gilber Huayllas, Llaqta Pata

      Process: Anaerobic Washed

      Variety: SL9

      The SL9 varietal has interested us for a long time. Colloquially known as “Inca Gesha” in Peru,
      SL9’s origins are still a mystery. Originally, Inca Gesha was thought to be its own distinct varietal
      hailing from Ethiopian Gesha genetics. However, genetic testing pioneered by Lance Schnorenberg
      of SEY Coffee and Christophe Montagnon of RD2 Vision found that Inca Gesha was a surprisingly close
      match to SL-09 from Kenya. As a result, Inca Gesha was almost universally renamed “SL9”. There is
      still debate about whether SL9 should still be referred to as Inca Gesha, as this was and still
      is the term Peruvian farmers use to refer to their crop, and while it is a very close match to SL-09,
      it is not exact.

      We acquired this lot from Llaqta Pata due to a very unique situation. Originally, we were supposed
      to receive the #3 Cup of Excellence lot from Llaqta Pata. Unfortunately, FedEx lost that lot in
      transit and deemed it unrecoverable. Thankfully, through some work with our partners, they generously
      replaced it with a later harvest from the same CoE plot in Llaqta Pata that used the exact same
      processing method.

      This specific lot we have received from Llaqta Pata is anaerobically washed and showcases the florality
      and malic acidity that SL9 is known for. The cherries are first fermented for 12 hours at low temperature
      in grainpro bags and then de-pulped. Next, the coffee is fermented for another 12 hours in water.
      Finally, the coffee is dried for 20 days on raised beds.'
